<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.1"/>
      <stop offset="40%" style="stop-color:#00ffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="speedGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.1"/>
      <stop offset="40%" style="stop-color:#ff6600;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="speedGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39ff14;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#39ff14;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="meterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#ffcc00"/>
      <stop offset="100%" style="stop-color:#ff3333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Grid lines (racing track feel) -->
  <g opacity="0.08" stroke="#00ffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Speedometer arc -->
  <g transform="translate(400, 340)" filter="url(#glowStrong)">
    <!-- Outer arc -->
    <path d="M -180 0 A 180 180 0 0 1 180 0" fill="none" stroke="#1a1a3a" stroke-width="24" stroke-linecap="round"/>
    <!-- Meter fill -->
    <path d="M -180 0 A 180 180 0 0 1 155 -90" fill="none" stroke="url(#meterGrad)" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
    <!-- Tick marks -->
    <g stroke="#ffffff" stroke-width="2" opacity="0.4">
      <line x1="-180" y1="0" x2="-160" y2="0"/>
      <line x1="-168" y1="-65" x2="-149" y2="-57"/>
      <line x1="-127" y1="-127" x2="-113" y2="-113"/>
      <line x1="-65" y1="-168" x2="-57" y2="-149"/>
      <line x1="0" y1="-180" x2="0" y2="-160"/>
      <line x1="65" y1="-168" x2="57" y2="-149"/>
      <line x1="127" y1="-127" x2="113" y2="-113"/>
      <line x1="168" y1="-65" x2="149" y2="-57"/>
      <line x1="180" y1="0" x2="160" y2="0"/>
    </g>
    <!-- Needle -->
    <line x1="0" y1="0" x2="130" y2="-100" stroke="#ff3333" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
  </g>

  <!-- Speed streaks (racing lines) -->
  <g filter="url(#glow)">
    <rect x="60" y="120" width="320" height="3" rx="1.5" fill="url(#speedGrad)" opacity="0.9"/>
    <rect x="120" y="135" width="240" height="2" rx="1" fill="url(#speedGrad)" opacity="0.6"/>
    <rect x="30" y="150" width="380" height="3" rx="1.5" fill="url(#speedGrad2)" opacity="0.9"/>
    <rect x="90" y="165" width="280" height="2" rx="1" fill="url(#speedGrad2)" opacity="0.5"/>
    <rect x="70" y="180" width="350" height="3" rx="1.5" fill="url(#speedGrad3)" opacity="0.8"/>
    <rect x="150" y="195" width="200" height="2" rx="1" fill="url(#speedGrad3)" opacity="0.5"/>
  </g>

  <!-- Secondary speed streaks (right side) -->
  <g filter="url(#glow)">
    <rect x="500" y="420" width="260" height="3" rx="1.5" fill="url(#speedGrad)" opacity="0.7"/>
    <rect x="540" y="435" width="220" height="2" rx="1" fill="url(#speedGrad2)" opacity="0.5"/>
    <rect x="480" y="450" width="300" height="3" rx="1.5" fill="url(#speedGrad3)" opacity="0.6"/>
    <rect x="560" y="465" width="200" height="2" rx="1" fill="url(#speedGrad)" opacity="0.4"/>
  </g>

  <!-- Performance bars (like a benchmark chart) -->
  <g transform="translate(530, 140)" filter="url(#glow)">
    <rect x="0" y="0" width="200" height="16" rx="3" fill="#00ffff" opacity="0.85"/>
    <text x="210" y="13" fill="#00ffff" font-family="monospace" font-size="12" opacity="0.7">2840 tok/s</text>
    <rect x="0" y="28" width="160" height="16" rx="3" fill="#39ff14" opacity="0.7"/>
    <text x="170" y="41" fill="#39ff14" font-family="monospace" font-size="12" opacity="0.7">2280 tok/s</text>
    <rect x="0" y="56" width="120" height="16" rx="3" fill="#ff6600" opacity="0.6"/>
    <text x="130" y="69" fill="#ff6600" font-family="monospace" font-size="12" opacity="0.7">1710 tok/s</text>
    <rect x="0" y="84" width="80" height="16" rx="3" fill="#ff3366" opacity="0.5"/>
    <text x="90" y="97" fill="#ff3366" font-family="monospace" font-size="12" opacity="0.7">1140 tok/s</text>
  </g>

  <!-- Particle dots -->
  <g fill="#00ffff" opacity="0.6">
    <circle cx="420" cy="130" r="2"/>
    <circle cx="460" cy="155" r="1.5"/>
    <circle cx="490" cy="120" r="1"/>
    <circle cx="380" cy="175" r="1.5"/>
    <circle cx="440" cy="190" r="2"/>
    <circle cx="200" cy="250" r="1"/>
    <circle cx="620" cy="380" r="1.5"/>
    <circle cx="680" cy="350" r="1"/>
    <circle cx="350" cy="480" r="2"/>
    <circle cx="150" cy="400" r="1.5"/>
  </g>

  <!-- vLLM text badge -->
  <g transform="translate(400, 530)">
    <rect x="-50" y="-16" width="100" height="28" rx="14" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
    <text text-anchor="middle" y="4" fill="#00ffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="3" opacity="0.6">vLLM</text>
  </g>
</svg>
