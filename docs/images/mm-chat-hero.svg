<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E040FB"/>
      <stop offset="100%" style="stop-color:#7C4DFF"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#1DE9B6"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6D00"/>
      <stop offset="100%" style="stop-color:#FFD600"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="300" r="180" fill="#E040FB" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="250" r="200" fill="#00E5FF" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="400" cy="500" r="150" fill="#FFD600" opacity="0.04" filter="url(#blur1)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>

  <!-- Left chat panel -->
  <g transform="translate(120, 120)">
    <!-- Panel frame -->
    <rect x="0" y="0" width="220" height="340" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="url(#glow1)" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="220" height="44" rx="16" fill="#E040FB" fill-opacity="0.12"/>
    <rect x="0" y="20" width="220" height="24" fill="#E040FB" fill-opacity="0.12"/>
    <!-- Model label -->
    <circle cx="22" cy="22" r="8" fill="#E040FB" opacity="0.8"/>
    <text x="38" y="27" font-family="monospace" font-size="13" fill="#E040FB" font-weight="bold">Model A</text>

    <!-- Chat bubbles -->
    <rect x="14" y="60" width="140" height="28" rx="12" fill="#E040FB" fill-opacity="0.15"/>
    <rect x="18" y="70" width="80" height="8" rx="4" fill="#E040FB" opacity="0.4"/>

    <rect x="60" y="100" width="146" height="36" rx="12" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="66" y="108" width="100" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="66" y="120" width="70" height="8" rx="4" fill="#ffffff" opacity="0.1"/>

    <rect x="14" y="150" width="120" height="28" rx="12" fill="#E040FB" fill-opacity="0.15"/>
    <rect x="18" y="160" width="60" height="8" rx="4" fill="#E040FB" opacity="0.4"/>

    <rect x="50" y="190" width="156" height="50" rx="12" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="56" y="198" width="110" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="56" y="210" width="90" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
    <rect x="56" y="222" width="60" height="8" rx="4" fill="#ffffff" opacity="0.08"/>

    <rect x="14" y="255" width="130" height="28" rx="12" fill="#E040FB" fill-opacity="0.15"/>
    <rect x="18" y="265" width="75" height="8" rx="4" fill="#E040FB" opacity="0.4"/>

    <!-- Typing indicator -->
    <g transform="translate(14, 298)">
      <circle cx="8" cy="8" r="4" fill="#E040FB" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="22" cy="8" r="4" fill="#E040FB" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="36" cy="8" r="4" fill="#E040FB" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Right chat panel -->
  <g transform="translate(460, 120)">
    <!-- Panel frame -->
    <rect x="0" y="0" width="220" height="340" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="url(#glow2)" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="220" height="44" rx="16" fill="#00E5FF" fill-opacity="0.12"/>
    <rect x="0" y="20" width="220" height="24" fill="#00E5FF" fill-opacity="0.12"/>
    <!-- Model label -->
    <circle cx="22" cy="22" r="8" fill="#00E5FF" opacity="0.8"/>
    <text x="38" y="27" font-family="monospace" font-size="13" fill="#00E5FF" font-weight="bold">Model B</text>

    <!-- Chat bubbles -->
    <rect x="14" y="60" width="140" height="28" rx="12" fill="#00E5FF" fill-opacity="0.15"/>
    <rect x="18" y="70" width="80" height="8" rx="4" fill="#00E5FF" opacity="0.4"/>

    <rect x="60" y="100" width="146" height="44" rx="12" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="66" y="108" width="110" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="66" y="120" width="80" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
    <rect x="66" y="132" width="50" height="8" rx="4" fill="#ffffff" opacity="0.08"/>

    <rect x="14" y="158" width="110" height="28" rx="12" fill="#00E5FF" fill-opacity="0.15"/>
    <rect x="18" y="168" width="55" height="8" rx="4" fill="#00E5FF" opacity="0.4"/>

    <rect x="50" y="200" width="156" height="36" rx="12" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="56" y="208" width="100" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="56" y="220" width="70" height="8" rx="4" fill="#ffffff" opacity="0.1"/>

    <rect x="14" y="250" width="150" height="28" rx="12" fill="#00E5FF" fill-opacity="0.15"/>
    <rect x="18" y="260" width="90" height="8" rx="4" fill="#00E5FF" opacity="0.4"/>

    <!-- Typing indicator -->
    <g transform="translate(14, 298)">
      <circle cx="8" cy="8" r="4" fill="#00E5FF" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="22" cy="8" r="4" fill="#00E5FF" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="36" cy="8" r="4" fill="#00E5FF" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Center VS / comparison element -->
  <g transform="translate(370, 250)">
    <circle cx="30" cy="30" r="28" fill="#0a0a1e" stroke="url(#glow3)" stroke-width="2"/>
    <text x="30" y="37" font-family="monospace" font-size="16" fill="#FFD600" text-anchor="middle" font-weight="bold">VS</text>
  </g>

  <!-- Connection lines between panels -->
  <line x1="340" y1="200" x2="370" y2="265" stroke="#FFD600" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="430" y1="265" x2="460" y2="200" stroke="#FFD600" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Floating media icons (multimodal indicators) -->
  <!-- Image icon -->
  <g transform="translate(380, 140)" opacity="0.5">
    <rect width="24" height="20" rx="3" fill="none" stroke="#E040FB" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="none" stroke="#E040FB" stroke-width="1"/>
    <polyline points="4,17 10,11 14,15 17,12 20,15" fill="none" stroke="#E040FB" stroke-width="1"/>
    <animateTransform attributeName="transform" type="translate" values="380,140;380,135;380,140" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Audio icon -->
  <g transform="translate(395, 420)" opacity="0.4">
    <rect x="6" y="0" width="8" height="14" rx="4" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
    <path d="M2,12 Q2,22 10,22 Q18,22 18,12" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
    <line x1="10" y1="22" x2="10" y2="27" stroke="#00E5FF" stroke-width="1.5"/>
    <animateTransform attributeName="transform" type="translate" values="395,420;395,415;395,420" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Video icon -->
  <g transform="translate(365, 430)" opacity="0.4">
    <rect width="18" height="14" rx="2" fill="none" stroke="#FFD600" stroke-width="1.5"/>
    <polygon points="20,2 28,7 20,12" fill="none" stroke="#FFD600" stroke-width="1.5"/>
    <animateTransform attributeName="transform" type="translate" values="365,430;365,425;365,430" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Sparkle particles -->
  <circle cx="300" cy="150" r="2" fill="#E040FB" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="480" r="2" fill="#00E5FF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="130" r="1.5" fill="#FFD600" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="480" r="1.5" fill="#7C4DFF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>