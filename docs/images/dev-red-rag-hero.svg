<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EE0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#EE0000" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Connection lines (knowledge graph edges) -->
  <g stroke="#EE0000" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
    <line x1="400" y1="260" x2="250" y2="160"/>
    <line x1="400" y1="260" x2="550" y2="160"/>
    <line x1="400" y1="260" x2="200" y2="340"/>
    <line x1="400" y1="260" x2="600" y2="340"/>
    <line x1="400" y1="260" x2="280" y2="430"/>
    <line x1="400" y1="260" x2="520" y2="430"/>
    <line x1="250" y1="160" x2="150" y2="100"/>
    <line x1="550" y1="160" x2="650" y2="100"/>
    <line x1="250" y1="160" x2="200" y2="340"/>
    <line x1="550" y1="160" x2="600" y2="340"/>
    <line x1="200" y1="340" x2="280" y2="430"/>
    <line x1="600" y1="340" x2="520" y2="430"/>
  </g>

  <!-- Animated data flow particles (static positions suggesting motion) -->
  <g filter="url(#glow)">
    <circle cx="325" cy="210" r="2.5" fill="#FF4444" opacity="0.9"/>
    <circle cx="475" cy="210" r="2.5" fill="#FF4444" opacity="0.7"/>
    <circle cx="300" cy="300" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="500" cy="300" r="2" fill="#FFD700" opacity="0.6"/>
    <circle cx="340" cy="345" r="2.5" fill="#FF4444" opacity="0.8"/>
    <circle cx="460" cy="345" r="2.5" fill="#FF4444" opacity="0.7"/>
  </g>

  <!-- Central brain/RAG hub -->
  <g filter="url(#bigGlow)">
    <circle cx="400" cy="260" r="45" fill="none" stroke="#EE0000" stroke-width="2" opacity="0.4"/>
    <circle cx="400" cy="260" r="35" fill="none" stroke="#FF4444" stroke-width="1.5" opacity="0.6"/>
    <circle cx="400" cy="260" r="25" fill="url(#nodeGrad)" opacity="0.9"/>
  </g>

  <!-- Central icon: magnifying glass + document (search/retrieval) -->
  <g transform="translate(400,260)" fill="white">
    <circle cx="-4" cy="-4" r="10" fill="none" stroke="white" stroke-width="2.5"/>
    <line x1="4" y1="4" x2="12" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small doc icon inside lens -->
    <rect x="-8" y="-8" width="8" height="10" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="-6" y1="-4" x2="-2" y2="-4" stroke="white" stroke-width="0.8"/>
    <line x1="-6" y1="-1.5" x2="-2" y2="-1.5" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Document nodes (sources) -->
  <!-- Top left doc -->
  <g transform="translate(250,160)">
    <circle r="18" fill="url(#docGrad)" opacity="0.85"/>
    <rect x="-7" y="-9" width="14" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-4" y1="-4" x2="4" y2="-4" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="-1" x2="4" y2="-1" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="2" x2="2" y2="2" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="5" x2="3" y2="5" stroke="white" stroke-width="1"/>
  </g>

  <!-- Top right doc -->
  <g transform="translate(550,160)">
    <circle r="18" fill="url(#docGrad)" opacity="0.85"/>
    <rect x="-7" y="-9" width="14" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-4" y1="-4" x2="4" y2="-4" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="-1" x2="4" y2="-1" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="2" x2="2" y2="2" stroke="white" stroke-width="1"/>
    <line x1="-4" y1="5" x2="3" y2="5" stroke="white" stroke-width="1"/>
  </g>

  <!-- Data nodes (embeddings/vectors) -->
  <!-- Left -->
  <g transform="translate(200,340)">
    <circle r="15" fill="#EE0000" opacity="0.7"/>
    <!-- Vector/cube icon -->
    <rect x="-6" y="-6" width="12" height="12" rx="1" fill="none" stroke="white" stroke-width="1.5" transform="rotate(15)"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Right -->
  <g transform="translate(600,340)">
    <circle r="15" fill="#EE0000" opacity="0.7"/>
    <rect x="-6" y="-6" width="12" height="12" rx="1" fill="none" stroke="white" stroke-width="1.5" transform="rotate(-15)"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Bottom nodes (user queries) -->
  <g transform="translate(280,430)">
    <circle r="14" fill="#CC0000" opacity="0.6"/>
    <!-- Chat bubble -->
    <rect x="-7" y="-6" width="14" height="10" rx="3" fill="none" stroke="white" stroke-width="1.3"/>
    <polygon points="-3,4 -1,8 1,4" fill="white" opacity="0.9"/>
  </g>

  <g transform="translate(520,430)">
    <circle r="14" fill="#CC0000" opacity="0.6"/>
    <!-- Chat bubble -->
    <rect x="-7" y="-6" width="14" height="10" rx="3" fill="none" stroke="white" stroke-width="1.3"/>
    <polygon points="-3,4 -1,8 1,4" fill="white" opacity="0.9"/>
  </g>

  <!-- Outer satellite nodes -->
  <g transform="translate(150,100)">
    <circle r="8" fill="#FF8C00" opacity="0.5"/>
  </g>
  <g transform="translate(650,100)">
    <circle r="8" fill="#FF8C00" opacity="0.5"/>
  </g>

  <!-- Decorative orbital rings -->
  <ellipse cx="400" cy="260" rx="180" ry="60" fill="none" stroke="#EE0000" stroke-width="0.5" opacity="0.15" transform="rotate(-20,400,260)"/>
  <ellipse cx="400" cy="260" rx="220" ry="80" fill="none" stroke="#FF4444" stroke-width="0.5" opacity="0.1" transform="rotate(15,400,260)"/>

  <!-- "RAG" label floating near center -->
  <text x="400" y="320" text-anchor="middle" font-family="monospace" font-size="14" fill="#FF4444" opacity="0.6" letter-spacing="6">R A G</text>

  <!-- Corner accent dots -->
  <circle cx="50" cy="50" r="3" fill="#EE0000" opacity="0.3"/>
  <circle cx="750" cy="50" r="3" fill="#EE0000" opacity="0.3"/>
  <circle cx="50" cy="550" r="3" fill="#EE0000" opacity="0.3"/>
  <circle cx="750" cy="550" r="3" fill="#EE0000" opacity="0.3"/>
</svg>